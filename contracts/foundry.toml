[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = ["@somnia-chain/reactivity-contracts/=node_modules/@somnia-chain/reactivity-contracts/"]
optimizer = true
optimizer_runs = 200
via_ir = true

